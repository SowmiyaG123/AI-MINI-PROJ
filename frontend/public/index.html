<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlavorAI - Smart Recipe Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="logo">🥗 FlavorAI</div>
            <p class="subtitle">Your Smart Recipe Companion</p>
        </header>

        <div id="chat-box" class="messages-area">
            <div class="message bot">
                <div class="card">
                    <p>Welcome! Type some ingredients or ask for a specific recipe.</p>
                </div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="input" placeholder="Type ingredients or ask for a recipe..." 
                   onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
